<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Marcely Marques - Gestão Estratégica. Entre em contato pelo WhatsApp, Instagram ou E-mail.">
  <title>Marcely Marques | Link da Bio</title>

  <!-- Preconectar Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Montserrat: 300 (Light), 400 (Regular), 500 (Medium), 600 (Semi-Bold) -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- CSS Principal -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Container principal (Bio Page) -->
  <main class="bio-page">
    <section class="bio-content">

      <!-- Cabeçalho Institucional -->
      <header class="bio-header">
        <div class="logo-container">
          <img class="brand-logo" src="Logo.png" alt="Logotipo Marcely Marques">
        </div>
      </header>

      <!-- Font Awesome CDN -->
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
      
      <!-- Botão de Contato -->
      <nav class="contact-buttons">

        <!-- Botão WhatsApp -->
        <a id="link-whatsapp" class="contact-button" href="https://wa.me/5547996927845" target="_blank"
          rel="noopener noreferrer" aria-label="Fale conosco pelo WhatsApp">
          <span class="btn-icon-wrapper">
            <!-- Icone WhatsApp via Font Awesome -->
            <i class="fab fa-whatsapp btn-icon"></i>
          </span>
          <span class="btn-text">WHATSAPP</span>
          <span class="btn-spacer"></span>
        </a>

        <!-- Botão Instagram -->
        <a id="link-instagram" class="contact-button" href="https://www.instagram.com/marcely.gestaoodonto/" target="_blank"
          rel="noopener noreferrer" aria-label="Siga-nos no Instagram">
          <span class="btn-icon-wrapper">
            <!-- Icone Instagram Linear Fino -->
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"
              stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
              <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
              <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
            </svg>
          </span>
          <span class="btn-text">INSTAGRAM</span>
          <span class="btn-spacer"></span>
        </a>

        <!-- Botão E-mail -->
        <a id="link-email" class="contact-button" href="mailto:marcely.gestaoodonto@outlook.com"
          aria-label="Envie um e-mail para nós">
          <span class="btn-icon-wrapper">
            <!-- Icone Envelope Linear Fino -->
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
          </span>
          <span class="btn-text">E-MAIL</span>
          <span class="btn-spacer"></span>
        </a>

      </nav>

      <!-- Assinatura Inferior -->
      <footer class="bio-footer">
        <a class="minimum-credit" href="https://www.instagram.com/agenciaminimum/" target="_blank"
          rel="noopener noreferrer" aria-label="Conheça a Agência Minimum no Instagram">
          Feito por Agência Minimum
        </a>
      </footer>

    </section>
  </main>

  <!-- Script de Configuração Principal -->
  <script src="script.js"></script>
</body>

</html>
